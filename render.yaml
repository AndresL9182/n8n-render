services:
  - type: web
    name: n8n-app
    env: docker
    plan: free
    autoDeploy: true

    envVars:
      - key: N8N_HOST
        value: 0.0.0.0

      - key: N8N_PORT
        value: 5678

      - key: N8N_PROTOCOL
        value: https

      - key: NODE_ENV
        value: production

      - key: WEBHOOK_URL
        sync: false

      - key: GENERIC_TIMEZONE
        value: America/Bogota

      - key: N8N_BASIC_AUTH_ACTIVE
        value: true

      - key: N8N_BASIC_AUTH_USER
        value: admin

      - key: N8N_BASIC_AUTH_PASSWORD
        value: admin123